name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: Linux
          - os: windows-latest
            label: Windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install fpcalc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libchromaprint-tools

      - name: Download fpcalc.exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/acoustid/chromaprint/releases/download/v1.5.1/chromaprint-fpcalc-1.5.1-windows-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile fpcalc.zip
          Expand-Archive fpcalc.zip -DestinationPath fpcalc_tmp
          Copy-Item fpcalc_tmp\chromaprint-fpcalc-1.5.1-windows-x86_64\fpcalc.exe .\fpcalc.exe

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller build.spec

      - name: Zip artifact (Linux)
        if: runner.os == 'Linux'
        run: zip -r DJCompanion-Linux.zip dist/DJCompanion/

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\DJCompanion\ -DestinationPath DJCompanion-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DJCompanion-${{ matrix.label }}
          path: DJCompanion-${{ matrix.label }}.zip
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DJCompanion-Linux.zip
            DJCompanion-Windows.zip
